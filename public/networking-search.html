<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador SIVM Networking</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a14;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header img {
    height: 40px;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 0.9rem;
    color: #888;
  }

  /* Search box */
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .search-box input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #2a2a3a;
    background: #12121e;
    color: #e0e0e0;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus {
    border-color: #8B5CF6;
  }
  .search-box input::placeholder {
    color: #555;
  }
  .search-box button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #8B5CF6;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .search-box button:hover {
    background: #7C3AED;
  }
  .search-box button:disabled {
    background: #3a3a4a;
    cursor: not-allowed;
  }

  /* Results */
  .results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-card {
    background: #12121e;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
    text-decoration: none;
    display: block;
  }
  .result-card:hover {
    border-color: #8B5CF6;
  }
  .result-card .date {
    font-size: 0.8rem;
    color: #8B5CF6;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .result-card .title {
    font-size: 1rem;
    color: #fff;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .result-card .relevance {
    font-size: 0.8rem;
    color: #666;
  }
  .result-card .relevance span {
    color: #8B5CF6;
    font-weight: 600;
  }

  /* States */
  .empty-state, .error-state {
    text-align: center;
    padding: 32px 16px;
    color: #666;
    font-size: 0.95rem;
  }
  .error-state { color: #f87171; }

  .loading {
    text-align: center;
    padding: 32px;
    color: #888;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #2a2a3a;
    border-top-color: #8B5CF6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer {
    margin-top: auto;
    padding-top: 48px;
    text-align: center;
    font-size: 0.75rem;
    color: #444;
  }
  .footer a { color: #666; text-decoration: none; }
  .footer a:hover { color: #8B5CF6; }

  /* Mobile */
  @media (max-width: 480px) {
    .search-box { flex-direction: column; }
    .search-box button { width: 100%; }
    .header h1 { font-size: 1.25rem; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="header">
    <img src="/logo_icon.png" alt="FIBA Labs">
    <h1>Buscador de Resumenes SIVM</h1>
    <p>Busca en los resumenes diarios del grupo de networking</p>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="query"
      placeholder="Ej: trabajo de diseno, servicios de contabilidad..."
      autocomplete="off"
    >
    <button id="searchBtn" onclick="doSearch()">Buscar</button>
  </div>

  <div id="results" class="results"></div>
</div>

<div class="footer">
  Powered by <a href="https://fibalabs.com">FIBA Labs</a>
</div>

<script>
const API_URL = "https://automations.fibalabs.com/networking-search/search";
const resultsEl = document.getElementById("results");
const queryEl = document.getElementById("query");
const searchBtn = document.getElementById("searchBtn");

// Allow Enter key to trigger search
queryEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") doSearch();
});

async function doSearch() {
  const query = queryEl.value.trim();
  if (query.length < 3) {
    resultsEl.innerHTML = '<div class="empty-state">Escribe al menos 3 caracteres para buscar.</div>';
    return;
  }

  // Show loading
  searchBtn.disabled = true;
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div><br>Buscando...</div>';

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });

    if (!res.ok) {
      throw new Error("Error del servidor");
    }

    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state">No se encontraron resultados. Intenta con otros terminos.</div>';
      return;
    }

    resultsEl.innerHTML = data.results.map((r) => {
      const dateFormatted = new Date(r.date + "T12:00:00").toLocaleDateString("es-CL", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
      });
      return `
        <a href="${r.notion_url}" target="_blank" rel="noopener" class="result-card">
          <div class="date">${dateFormatted}</div>
          <div class="title">${r.title}</div>
          <div class="relevance">Relevancia: <span>${r.relevance}%</span></div>
        </a>
      `;
    }).join("");

  } catch (err) {
    resultsEl.innerHTML = '<div class="error-state">Error al buscar. Intenta de nuevo.</div>';
    console.error(err);
  } finally {
    searchBtn.disabled = false;
  }
}
</script>

</body>
</html>
